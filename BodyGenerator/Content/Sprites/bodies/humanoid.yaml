      sC.
      Ch.
      hh.
      sh.

  upper_leg_left:
    width: 3
    height: 4
    anchor: [1, 0]
    joints:
      knee_left: [1, 3]
    pixels: |
      .LL
      LLL
      LlL
      .Ll

  lower_leg_left:
    width: 3
    height: 4
    anchor: [1, 0]
    joints:
      ankle_left: [1, 3]
    pixels: |
      .Ll
      .LL
      .BB
      .BB

  upper_leg_right:
    width: 3
    height: 4
    anchor: [1, 0]
    joints:
      knee_right: [1, 3]
    pixels: |
      LL.
      LLL
      LlL
      lL.

  lower_leg_right:
    width: 3
    height: 4
    anchor: [1, 0]
    joints:
      ankle_right: [1, 3]
    pixels: |
      lL.
      LL.
      BB.
      BB.

  hand_left:
