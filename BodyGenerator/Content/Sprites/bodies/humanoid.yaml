name: humanoid
sprite_size: 32

hierarchy:
  part: torso
  children:
    - part: head
      joint: neck
    - part: upper_arm_left
      joint: shoulder_left
      children:
        - part: lower_arm_left
          joint: elbow_left
          children:
            - part: hand_left
              joint: wrist_left
    - part: upper_arm_right
      joint: shoulder_right
      children:
        - part: lower_arm_right
          joint: elbow_right
          children:
            - part: hand_right
              joint: wrist_right
    - part: upper_leg_left
      joint: hip_left
      children:
        - part: lower_leg_left
          joint: knee_left
          children:
            - part: foot_left
              joint: ankle_left
    - part: upper_leg_right
      joint: hip_right
      children:
        - part: lower_leg_right
          joint: knee_right
          children:
            - part: foot_right
              joint: ankle_right

parts:
  torso:
    width: 8
    height: 7
    anchor: [4, 0]
    joints:
      neck: [4, 0]
      shoulder_left: [0, 1]
      shoulder_right: [7, 1]
      hip_left: [2, 6]
      hip_right: [5, 6]
    pixels: |
      ..CCCC..
      .CSCCSC.
      CCCCCCCC
      CCCCCCCC
      CGHCCGCC
      .CbbbCC.
      ..CCCC..

  head:
    width: 6
    height: 7
    anchor: [3, 6]
    joints: {}
    pixels: |
      .ssss.
      shhHhs
      shhhhs
      sEhhEs
      sEhhEs
      .shhs.
      ..ss..

  upper_arm_left:
    width: 3
    height: 4
    anchor: [2, 0]
    joints:
      elbow_left: [1, 3]
    pixels: |
      .CC
      CCC
      CSC
      .Cs

  lower_arm_left:
    width: 3
    height: 4
    anchor: [1, 0]
    joints:
      wrist_left: [1, 3]
    pixels: |
      .Cs
      .hC
      .hh
      .hs

  upper_arm_right:
    width: 3
    height: 4
    anchor: [0, 0]
    joints:
      elbow_right: [1, 3]
    pixels: |
      CC.
      CCC
      CSC
      sC.

  lower_arm_right:
    width: 3
    height: 4
    anchor: [1, 0]
    joints:
